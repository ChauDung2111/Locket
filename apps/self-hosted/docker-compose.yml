services:
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: locketdio-api
    env_file:
      - ./api/.env.production
    environment:
      - NODE_ENV=production
      - PORT=5001
    ports:
      - "5001:5001"
    restart: unless-stopped

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: locketdio-web
    env_file:
      - ./web/.env.production
    environment:
      - NODE_ENV=production
    ports:
      - "5173:5173"
    depends_on:
      - api
    restart: unless-stopped
